         <h1>SIMPLE CONVERTER</h1>
       <div class="custom-form">
        
          <div class="input-wrapper">
             <label for="convert">TEXT CONVERTER</label>
            <textarea name="" id="convert" rows="5" placeholder="Message"></textarea>
          </div>
          <p>Characters: <span id="charCount">0</span></p>
          <div class="btn-wrapper">
             <button class="lower" onclick="lower()">LOWERCASE</button>
             <button class="capital" onclick="capital()">CAPITALIZE</button>
             <button class="upper" onclick="upper()">UPPERCASE</button>

             <button class="title" onclick="clearText()">CLEAR</button>
             
          </div>

        </div>
    </div>

    <!-- temp convert ---->
    <div class="temp-convert">
    <div class="temp-wrap">
        <form onsubmit="btnSub(event)">
            <div class="form-wrapper">
                <h1>Temperature Conversion</h1>
                <br>
                <div class="inp-temp">
                     <input type="text" placeholder="Input" id="inp"> <p>=</p> <h3 id="restemp">0 ° Temp</h3>
                </div>
                <br>
                <div>
                    <input type="radio" id="celtofar" name="unit">
                    <label for="celtofar"> Celsius ☞ Fahrenheit</label>
                </div>
                <div>
                    <input type="radio" id="fartocel" name="unit">
                    <label for="fsrtocel"> Celsius ☞ Fahrenheit</label>
                </div>
            </div>
            <button type="submit" id="btntemp">Convert</button>
